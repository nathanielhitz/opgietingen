name: Scrape opgiet-events

on:
  schedule:
    - cron: "0 6 * * 1"   # elke maandag 06:00 UTC (± 07:00/08:00 NL-tijd)
  workflow_dispatch:
    inputs:
      limit:
        description: "Max. aantal bronnen (leeg = alle actieve bronnen)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Stap 1 — verifieer bronnen (robots, redirects, agendapagina-discovery,
      # Firecrawl-fallback voor JS-gerenderde pagina's). Werkt bronnen.json bij;
      # kapotte/gewijzigde bronnen worden gemeld via het scraper-issue.
      - name: Verifieer bronnen
        run: npm run verify-bronnen -- --all
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      # Stap 2 — scrape alleen de actieve bronnen.
      - name: Scrape events (poort → gepubliceerd/concept in content/events/)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPE_AUTOPUBLISH: "true"
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            npm run scrape -- --limit "${{ github.event.inputs.limit }}"
          else
            npm run scrape
          fi

      # Stap 3 — verwerk nieuwsbrieven uit de gedeelde inbox (events@opgietingen.nl).
      # Slaat zichzelf over als de IMAP-secrets nog niet gezet zijn.
      - name: Scrape nieuwsbrieven (IMAP → poort → concept/gepubliceerd)
        env:
          MAIL_IMAP_HOST: ${{ secrets.MAIL_IMAP_HOST }}
          MAIL_IMAP_PORT: ${{ secrets.MAIL_IMAP_PORT }}
          MAIL_IMAP_USER: ${{ secrets.MAIL_IMAP_USER }}
          MAIL_IMAP_PASS: ${{ secrets.MAIL_IMAP_PASS }}
          MAIL_IMAP_TLS: ${{ secrets.MAIL_IMAP_TLS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SCRAPE_AUTOPUBLISH: "true"
        run: npm run scrape-mail

      - name: Commit resultaten op main
        run: |
          git config user.name "opgietingen-bot"
          git config user.email "bot@opgietingen.nl"
          git add content/events content/bronnen.json
          if git diff --cached --quiet; then
            echo "Geen wijzigingen om te committen."
          else
            git commit -m "chore(scraper): wekelijkse run — nieuwe events + bronnenstatus"
            git push origin HEAD:main
          fi

      - name: Bouw probleemrapport
        id: report
        run: echo "status=$(npm run --silent scrape-report)" >> "$GITHUB_OUTPUT"

      - name: Beheer scraper-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create scraper-probleem --color B60205 --description "Scraper heeft aandacht nodig" || true
          EXISTING=$(gh issue list --label scraper-probleem --state open --json number --jq '.[0].number')
          if [ "${{ steps.report.outputs.status }}" = "problemen" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue edit "$EXISTING" --body-file scrape-issue.md
              gh issue comment "$EXISTING" --body "Rapport bijgewerkt door de wekelijkse run."
            else
              gh issue create --title "Scraper: aandachtspunten" \
                --label scraper-probleem --body-file scrape-issue.md
            fi
          else
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" --comment "Schone run — geen aandachtspunten meer."
            fi
          fi
