name: Scrape opgiet-events

# Draait elke maandag om 06:00 UTC (± 07:00/08:00 NL-tijd). Ook handmatig te starten.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max. aantal bronnen (leeg = alle actieve bronnen)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Stap 1 — verifieer bronnen (robots, redirects, agendapagina-discovery).
      # Werkt bronnen.json bij: kapotte/gewijzigde URL's worden zo automatisch
      # gemeld in de PR. Vereist geen API-keys (plain fetch).
      - name: Verifieer bronnen
        run: npm run verify-bronnen -- --all

      # Stap 2 — scrape alleen de actieve bronnen.
      - name: Scrape events (nieuwe concepts naar content/events/)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            npm run scrape -- --limit "${{ github.event.inputs.limit }}"
          else
            npm run scrape
          fi

      # Stap 3 — bouw de PR-beschrijving met de actuele bronnenstatus.
      - name: Bouw PR-beschrijving
        run: |
          {
            echo "Automatisch gescrapete opgiet-events, toegevoegd als **concept**."
            echo ""
            echo "- Bronnen eerst geverifieerd (\`verify-bronnen\`), daarna gescraped."
            echo "- Fetch + extractie via Firecrawl, met Claude-fallback (\`claude-haiku-4-5\`)."
            echo "- Gededupliceerd op \`saunaSlug + startDatum\`; nieuwe events krijgen \`status: concept\`."
            echo ""
            echo "**Reviewstappen vóór merge:** controleer datums/titels/types, zet \`concept\` → \`gepubliceerd\` voor wat live mag, en corrigeer/verwijder onjuiste events."
            echo ""
            npm run --silent bronnen-report
          } > pr-body.md

      - name: Pull request met nieuwe events + bronnenstatus
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: |
            content/events
            content/bronnen.json
          branch: scrape/nieuwe-events
          delete-branch: true
          commit-message: "chore(scraper): nieuwe opgiet-events (concept) + bronnenstatus"
          title: "Nieuwe opgiet-events (concept) — wekelijkse scrape"
          body-path: pr-body.md
          labels: |
            scraper
            automated
